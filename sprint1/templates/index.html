<!DOCTYPE html>
<html>

<head>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <link rel="stylesheet" href="/static/CSS/common.css">
</head>

<body>
    <nav>
        <button class="nav-button"> Import </button>
        <button class="nav-button"> Export </button>
    </nav>

    <div class="app">
        <div class="card">
            <h2 class="card-title">Import</h2>

            <div class="card-scroll-box">
                <!--<div class="card-scroll-box-shadow"></div> -->
                <table id="file-table">
                    <tbody>

                    </tbody>
                </table>
            </div>

            <div>
                <button class="card-button" onclick="addFiles()">Add Files</button>
                <button class="card-button" onclick="confirm()">Confirm</button>
            </div>
        </div>

        <div class="card">
            <div>
                <button class="card-button" onclick="next(-1)">Previous</button>
                <button class="card-button" onclick="next( 1)">Next</button>
            </div>
            <img id="results" src="" />
        </div>
    </div>

    <script>

        let curr_step = 0
        function next(step)
        {
            if (received.length == 0)
                return;

            curr_step += step;
            curr_step %= received.length;
            results_img.src = `/results/${received[curr_step]}`;

            console.log(`${step}   ${curr_step}    ${results_img.src}`);
        }

        const socket = io();

        received = []
        socket.on("status", (data) => {
            received.push(data.message);
            if (received.length == 1)
                next(0);
        });

        socket.on("done", () => {
            console.log("Processing finished.");
        });

        const file_list   = document.getElementById("file-list");
        const results_img = document.getElementById("results");
        var csvFiles = [];
        var files = [];

        let dependancies = {};

        function updateFileList() {
            const minRowCount = 16

            const tbody = document.querySelector("#file-table tbody");
            tbody.innerHTML = "";
            let seen = [];

            function createRow(name = "", isPresent = true, onClick = () => { }, indent = 0) {
                let tr = document.createElement("tr");
                if (name === "") tr.className = "empty-row";
                else tr.className = isPresent ? "file-present" : "file-missing";

                let tdName = document.createElement("td");
                if (indent > 0 && name !== "") {
                    let span = document.createElement("span");
                    span.className = "tree-span";
                    span.style.marginLeft = `${indent}rem`;
                    tdName.appendChild(span);
                }
                tdName.appendChild(document.createTextNode(name));
                tr.appendChild(tdName);

                let tdButton = document.createElement("td");
                if (name !== "") {
                    let btn = document.createElement("button");
                    btn.innerText = isPresent ? "Delete" : "Import";
                    btn.addEventListener("click", onClick);
                    tdButton.appendChild(btn);
                }
                tr.appendChild(tdButton);

                return tr;
            }

            // CSV dependencies
            for (let [csvFile, dependants] of Object.entries(dependancies)) {
                tbody.appendChild(createRow(csvFile, true, () => { removeFile(csvFile) }, 0));

                for (let file of dependants) {
                    let isPresent = files.some(f => f.name === file);
                    tbody.appendChild(
                        createRow(file, isPresent, () => {
                            if (isPresent) removeFile(file);
                            else addFile();
                        }, 1) // indent dependants
                    );
                    seen.push(file);
                }
            }

            // Top-level files
            for (let file of files) {
                if (seen.includes(file.name)) continue;
                tbody.appendChild(
                    createRow(file.name, true, () => removeFile(file.name))
                );
            }

            // Pad table to at least n rows
            const currentRows = tbody.querySelectorAll("tr").length;
            for (let i = currentRows; i < minRowCount; i++) {
                tbody.appendChild(createRow()); // empty row
            }
        }

        function fileInclude(e) {

            let immediate = [];

            for (let i = 0; i < e.target.files.length; i++) {
                let curr = e.target.files.item(i);

                if (files.some(f => f.name === curr.name) || csvFiles.some(f => f === curr.name)) {
                    continue;
                }

                if (curr.type === "text/csv") {
                    csvFiles.push(curr.name);
                    immediate.push(curr);
                    continue
                }
                files.push(curr);
            }

            if (immediate.length > 0) {
                let formData = new FormData();
                for (const csv of immediate) {
                    formData.append("files", csv);
                }

                fetch('/csv_post', {
                    method: "POST",
                    body: formData
                })
                    .then(res => {
                        if (!res.ok) {
                            throw new Error("Server error " + res.status);
                        }
                        return res.json();
                    })
                    .then(data => {
                        Object.assign(dependancies, data);
                    })
                    .catch(err => console.error("Fetch error:", err))
                    .finally(updateFileList);
                return;
            }
            updateFileList()
        }

        function addFiles() {
            //  Create hidden input object to create dialog menu
            var input = document.createElement('input');
            input.type = 'file';
            input.multiple = true;

            //  Send file objects to other function
            input.onchange = fileInclude
            input.click();
        }

        function addFile() {
            //  Create hidden input object to create dialog menu
            var input = document.createElement('input');
            input.type = 'file';

            //  Send file objects to other function
            input.onchange = fileInclude

            input.click();
        }

        function removeFile(fileName) {
            let file_array = []
            if (fileName.includes(".csv")) {
                file_array = dependancies[fileName];
                delete dependancies[fileName];
            }
            else
                file_array = [fileName];

            files = files.filter(function (file) {
                return !(file_array.includes(file.name));
            });

            updateFileList();
        }

        function confirm() {
            let missing = []

            for (let [_, dependants] of Object.entries(dependancies)) {
                for (let file of dependants) {
                    if (files.some(f => f.name === file))
                        continue;

                    missing.push(file);
                }
            }

            if (missing.length != 0) {
                alert(`The file upload could not be processed\n\nMissing files:\n\t${missing.join("\n\t")}`);
                return
            }

            let formData = new FormData();

            for (let file of files)
                formData.append("files", file);

            fetch('/media_post', {
                method: "POST",
                body: formData
            })
                .then(res => res.json())
                .then(data => {

                    // Trigger background processing via socket
                    socket.emit("start_processing", {
                        files: data.saved
                    });
                    csvFiles = [];
                    files = [];
                    dependancies = {};
                    updateFileList();
                })
                .catch(err => console.error("Upload error:", err));
        }

        updateFileList();   //  To pad out table
    </script>
</body>

</html>
