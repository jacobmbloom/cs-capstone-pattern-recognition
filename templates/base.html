<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}File Import{% endblock %}</title>

    {% block styles %}

    {% endblock %}
</head>

<body>

    <nav>
        <div class="nav-logo">WorkSpace</div>
        <a href="{{ url_for('results') }}" id="results-active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="7" height="7" />
                <rect x="14" y="3" width="7" height="7" />
                <rect x="3" y="14" width="7" height="7" />
                <rect x="14" y="14" width="7" height="7" />
            </svg>
            Dashboard
        </a>
        <a href="{{ url_for('files') }}" id="files-active">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <polyline points="14 2 14 8 20 8" />
            </svg>
            Files
        </a>
        <a href="{{ url_for('download_csv') }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3" />
                <path d="M19.07 4.93A10 10 0 1 0 4.93 19.07" />
            </svg>
            Export
        </a>
        <a href="{{ url_for('files') }}">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
                <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            Help
        </a>
    </nav>

    {% block content %}
    <!-- Main page content goes here -->
    {% endblock %}

    {% block scripts %}
    <!-- Add JS here -->
    {% endblock %}

</body>
</html>
